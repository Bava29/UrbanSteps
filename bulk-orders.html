<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>

    <!-- Character Encoding -->
    <meta charset="UTF-8">

    <!-- Responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Website Title -->
    <title>UrbanSteps</title>

    <!-- SEO -->
    <meta name="description"
        content="Discover premium footwear for men, women, sports, and kids with UrbanSteps. Explore top brands, seasonal collections, and find your perfect fit.">

    <meta name="keywords"
        content="shoe store, footwear, sneakers, casual shoes, formal shoes, sports shoes, kids shoes, UrbanSteps">

    <meta name="author" content="UrbanSteps">

    <!-- Favicon -->
    <link rel="icon" href="images/favicon.png" type="image/png">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;700&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <!-- Swiper CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">

    <!-- AOS CSS -->
    <link rel="stylesheet" href="https://unpkg.com/aos@2.3.4/dist/aos.css">

    <!-- Main CSS -->
    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <!--======================================
    Bulk Order Header
=======================================-->

    <header class="bulk-order-header">

        <div class="global-container">

            <div class="bulk-order-navbar">

                <a href="index.html" class="bulk-order-logo">

                    <img src="images/logo.png" alt="UrbanSteps Logo">

                </a>

                <div class="bulk-order-navbar-right">

                    <button id="theme-toggle">

                        <i class="fa-solid fa-moon"></i>

                    </button>

                    <button id="rtl-toggle">

                        <i class="fa-solid fa-right-left"></i>

                    </button>

                </div>

            </div>

        </div>

    </header>

    <!--======================================
    Bulk Order Form
=======================================-->

    <section class="bulk-order-enquiry section">

        <div class="global-container">

            <div class="section-title text-center">

                <span class="section-subtitle">

                    Bulk Order Request

                </span>

                <h2>

                    Request Your Bulk Footwear Quote

                </h2>

                <p>

                    Complete the form below and our team will get back to you with a customized quotation.

                </p>

            </div>

            <div class="bulk-order-enquiry-wrapper">

                <form class="bulk-order-enquiry-form">

                    <div class="bulk-order-enquiry-grid">

                        <div class="bulk-order-enquiry-field">

                            <label>Company / Organization Name</label>

                            <input type="text" placeholder="Enter company name" required>

                        </div>

                        <div class="bulk-order-enquiry-field">

                            <label>Contact Person</label>

                            <input type="text" placeholder="Enter contact person" required>

                        </div>

                        <div class="bulk-order-enquiry-field">

                            <label>Email Address</label>

                            <input type="email" placeholder="Enter email address" required>

                        </div>

                        <div class="bulk-order-enquiry-field">

                            <label>Phone Number</label>

                            <input type="tel" placeholder="Enter phone number" required>

                        </div>

                        <div class="bulk-order-enquiry-field">

                            <label>Product Category</label>

                            <select required>

                                <option value="">Select Product</option>
                                <option>Sports Shoes</option>
                                <option>Casual Shoes</option>
                                <option>Formal Shoes</option>
                                <option>School Shoes</option>
                                <option>Safety Shoes</option>
                                <option>Sandals</option>

                            </select>

                        </div>

                        <div class="bulk-order-enquiry-field">

                            <label>Quantity Required</label>

                            <input type="number" placeholder="e.g. 250 Pairs" required>

                        </div>

                    </div>

                    <div class="bulk-order-enquiry-field">

                        <label>Delivery Address</label>

                        <input type="text" placeholder="Enter delivery location">

                    </div>

                    <div class="bulk-order-enquiry-field">

                        <label>Additional Requirements</label>

                        <textarea rows="6" placeholder="Tell us about your bulk order requirements..."></textarea>

                    </div>

                    <button type="submit" class="primary-btn bulk-order-enquiry-btn">

                        Request Quote

                    </button>

                </form>

            </div>

        </div>

    </section>

    <!-- Swiper JS -->
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <!-- Main JS -->
    <script src="js/main.js"></script>

</body>

</html>
