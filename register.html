<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>

    <!-- Character Encoding -->
    <meta charset="UTF-8">

    <!-- Responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Website Title -->
    <title>UrbanSteps</title>

    <!-- SEO -->
    <meta name="description"
        content="Discover premium footwear for men, women, sports, and kids with UrbanSteps. Explore top brands, seasonal collections, and find your perfect fit.">

    <meta name="keywords"
        content="shoe store, footwear, sneakers, casual shoes, formal shoes, sports shoes, kids shoes, UrbanSteps">

    <meta name="author" content="UrbanSteps">

    <!-- Favicon -->
    <link rel="icon" href="images/favicon.png" type="image/png">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;700&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <!-- Swiper CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">

    <!-- AOS CSS -->
    <link rel="stylesheet" href="https://unpkg.com/aos@2.3.4/dist/aos.css">

    <!-- Main CSS -->
    <link rel="stylesheet" href="css/style.css">

</head>

<body>


    <section class="auth-section">

        <div class="auth-top-actions">

            <button id="theme-toggle">

                <i class="fa-solid fa-moon"></i>

            </button>

            <button id="rtl-toggle">

                <i class="fa-solid fa-right-left"></i>

            </button>

        </div>


        <div class="auth-card">

            <!-- Logo -->

            <a href="index.html" class="auth-logo">

                <img src="images/logo.png" alt="UrbanSteps">

            </a>

            <!-- Heading -->

            <div class="auth-heading">

                <h2>

                    Create Account

                </h2>

                <p>

                    Join UrbanSteps and discover premium footwear collections.

                </p>

            </div>

            <!-- Form -->

            <form class="auth-form">

                <div class="form-group">

                    <label>

                        Full Name

                    </label>

                    <input type="text" placeholder="Enter your full name" required>

                </div>

                <div class="form-group">

                    <label>

                        Phone Number

                    </label>

                    <input type="tel" placeholder="Enter your phone number" required>

                </div>

                <div class="form-group">

                    <label>

                        Email Address

                    </label>

                    <input type="email" placeholder="Enter your email" required>

                </div>

                <div class="form-group password-group">

                    <label>Password</label>

                    <div class="password-field">

                        <input type="password" placeholder="Create a password">

                        <span class="toggle-password">

                            <i class="fa-regular fa-eye"></i>

                        </span>

                    </div>

                </div>

                <div class="form-group password-group">

                    <label>

                        Confirm Password

                    </label>

                    <div class="password-field">

                        <input type="password" id="confirm-password" placeholder="Confirm your password" required>

                        <span class="toggle-password">

                            <i class="fa-regular fa-eye"></i>

                        </span>
                    </div>

                </div>

                <div class="auth-options">

                    <label>

                        <input type="checkbox" required>

                        I agree to the

                        <a href="#">

                            Terms & Conditions

                        </a>

                    </label>

                </div>

                <button type="submit" class="primary-btn auth-btn">

                    Create Account

                </button>

            </form>

            <!-- Divider -->

            <div class="auth-divider">

                <span>

                    Or Continue With

                </span>

            </div>

            <!-- Social Login -->

            <div class="social-login">

                <a href="#" class="social-btn google">

                    <img src="images/google-logo.svg" alt="Google">

                </a>

                <a href="#" class="social-btn facebook">

                    <i class="fa-brands fa-facebook-f"></i>

                </a>

                <a href="#" class="social-btn apple">

                    <i class="fa-brands fa-apple"></i>

                </a>

                <a href="#" class="social-btn twitter">

                    <i class="fa-brands fa-x-twitter"></i>

                </a>

            </div>

            <!-- Bottom -->

            <div class="auth-footer">

                <p>

                    Already have an account?

                    <a href="login.html">

                        Login

                    </a>

                </p>

            </div>

        </div>

    </section>


    <!-- Swiper JS -->
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <!-- Main JS -->
    <script src="js/main.js"></script>

</body>

</html>
